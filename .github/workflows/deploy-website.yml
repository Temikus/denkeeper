name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/deploy-website.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install npm dependencies
        run: npm ci
        working-directory: website

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.159.1"
          extended: true

      - name: Install Dart Sass
        run: |
          SASS_VERSION="1.89.1"
          curl -fsSL "https://github.com/sass/dart-sass/releases/download/${SASS_VERSION}/dart-sass-${SASS_VERSION}-linux-x64.tar.gz" \
            | sudo tar -xz -C /usr/local/lib --strip-components=1
          sudo ln -s /usr/local/lib/sass /usr/local/bin/sass
          sass --version

      - name: Build site
        run: hugo --minify --gc --environment production
        working-directory: website

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/public

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

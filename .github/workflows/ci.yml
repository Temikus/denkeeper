name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Build web UI
        run: cd web && npm ci && npm run build
      - uses: jdx/mise-action@v4
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Build web UI
        run: cd web && npm ci && npm run build
      - uses: jdx/mise-action@v4
      - run: go test -race -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  vuln:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Build web UI
        run: cd web && npm ci && npm run build
      - uses: jdx/mise-action@v4
      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Build web UI
        run: cd web && npm ci && npm run build
      - uses: jdx/mise-action@v4
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o denkeeper-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/denkeeper
      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: denkeeper-${{ matrix.goos }}-${{ matrix.goarch }}
          path: denkeeper-${{ matrix.goos }}-${{ matrix.goarch }}

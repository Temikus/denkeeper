name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-ui:
    name: Build Web UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build web UI
        run: cd web && npm ci && npm run build
      - name: Upload web UI artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-ui-dist
          path: internal/web/dist/
          retention-days: 1

  test-ui:
    name: Web UI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Lint Svelte templates
        run: |
          if grep -rn -E '="[^"]*\$\{[A-Za-z_][A-Za-z_0-9]*\}[^"]*"' web/src --include='*.svelte' | grep -qv '={"'; then
            echo "ERROR: Unescaped \${} in Svelte attribute strings (Svelte interprets {…} as expressions):"
            grep -rn -E '="[^"]*\$\{[A-Za-z_][A-Za-z_0-9]*\}[^"]*"' web/src --include='*.svelte' | grep -v '={"'
            echo 'Fix: wrap the attribute value as a JS string, e.g. placeholder={"text ${VAR} text"}'
            exit 1
          fi
      - run: cd web && npm ci && npm run test:coverage
      - name: Upload UI coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ui-coverage
          path: web/coverage/
          retention-days: 7

  lint:
    name: Lint
    needs: build-ui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download web UI
        uses: actions/download-artifact@v8
        with:
          name: web-ui-dist
          path: internal/web/dist/
      - uses: jdx/mise-action@v4
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
          args: --build-tags mcp_go_client_oauth

  test:
    name: Test
    needs: build-ui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download web UI
        uses: actions/download-artifact@v8
        with:
          name: web-ui-dist
          path: internal/web/dist/
      - uses: jdx/mise-action@v4
      - name: Cache Go modules and build
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-
      - run: go test -tags mcp_go_client_oauth -race -coverprofile=coverage.out ./...
      - name: Integration tests
        run: go test -tags "mcp_go_client_oauth,integration" -race -v ./internal/integration/...
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  vuln:
    name: Security Scan
    needs: build-ui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download web UI
        uses: actions/download-artifact@v8
        with:
          name: web-ui-dist
          path: internal/web/dist/
      - uses: jdx/mise-action@v4
      - name: Cache Go modules and build
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-
      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest -tags mcp_go_client_oauth ./...

  build:
    name: Build
    needs: build-ui
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v6
      - name: Download web UI
        uses: actions/download-artifact@v8
        with:
          name: web-ui-dist
          path: internal/web/dist/
      - uses: jdx/mise-action@v4
      - name: Cache Go modules and build
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ matrix.goos }}-${{ matrix.goarch }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-${{ matrix.goos }}-${{ matrix.goarch }}-
            go-${{ runner.os }}-
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -tags mcp_go_client_oauth -o denkeeper-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/denkeeper
      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: denkeeper-${{ matrix.goos }}-${{ matrix.goarch }}
          path: denkeeper-${{ matrix.goos }}-${{ matrix.goarch }}

  test-e2e:
    name: E2E Tests
    needs: [build-ui, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Download web UI
        uses: actions/download-artifact@v8
        with:
          name: web-ui-dist
          path: internal/web/dist/
      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: denkeeper-linux-amd64
      - name: Make binary executable
        run: chmod +x denkeeper-linux-amd64
      - name: Install dependencies
        run: cd web && npm ci
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('web/package-lock.json') }}
      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: cd web && npx playwright install --with-deps chromium
      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: cd web && npx playwright install-deps chromium
      - name: Create E2E data directory
        run: |
          dir="$(mktemp -d)"
          mkdir -p "$dir/agents/default" "$dir/skills" "$dir/data"
          echo "DENKEEPER_DATA_DIR=$dir" >> "$GITHUB_ENV"
      - name: Start denkeeper
        run: |
          ./denkeeper-linux-amd64 serve --config web/test/e2e/fixtures/test.toml &
          sleep 3
          curl -sf http://localhost:8080/ > /dev/null && echo "Server ready" || echo "Server not responding"
          echo '--- Login smoke test ---'
          curl -s -w "\nHTTP %{http_code}\n" -H 'Content-Type: application/json' -d '{"password":"test"}' http://localhost:8080/auth/login
          echo '--- Skills API test ---'
          curl -s -w "\nHTTP %{http_code}\n" -H 'Authorization: Bearer e2e-test-token-12345678' http://localhost:8080/api/v1/skills
        env:
          BASE_URL: http://localhost:8080
      - name: Run E2E tests
        run: cd web && npx playwright test
        timeout-minutes: 5
        env:
          BASE_URL: http://localhost:8080
          CI: "true"
      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: web/test-results/

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-ui:
    name: Build Web UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build web UI
        run: cd web && npm ci && npm run build
      - name: Upload web UI artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-ui-dist
          path: internal/web/dist/
          retention-days: 1

  lint:
    name: Lint
    needs: build-ui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download web UI
        uses: actions/download-artifact@v8
        with:
          name: web-ui-dist
          path: internal/web/dist/
      - uses: jdx/mise-action@v4
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3

  test:
    name: Test
    needs: build-ui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download web UI
        uses: actions/download-artifact@v8
        with:
          name: web-ui-dist
          path: internal/web/dist/
      - uses: jdx/mise-action@v4
      - name: Cache Go modules and build
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-
      - run: go test -race -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  vuln:
    name: Security Scan
    needs: build-ui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download web UI
        uses: actions/download-artifact@v8
        with:
          name: web-ui-dist
          path: internal/web/dist/
      - uses: jdx/mise-action@v4
      - name: Cache Go modules and build
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-
      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  build:
    name: Build
    needs: build-ui
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v6
      - name: Download web UI
        uses: actions/download-artifact@v8
        with:
          name: web-ui-dist
          path: internal/web/dist/
      - uses: jdx/mise-action@v4
      - name: Cache Go modules and build
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ matrix.goos }}-${{ matrix.goarch }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-${{ matrix.goos }}-${{ matrix.goarch }}-
            go-${{ runner.os }}-
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o denkeeper-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/denkeeper
      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: denkeeper-${{ matrix.goos }}-${{ matrix.goarch }}
          path: denkeeper-${{ matrix.goos }}-${{ matrix.goarch }}

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write        # Required for cosign keyless OIDC signing and build attestations
  attestations: write    # Required for actions/attest-build-provenance

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Build web UI
        run: cd web && npm ci && npm run build
      - uses: jdx/mise-action@v4
      - run: go test -race ./...

  release:
    name: Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Build web UI
        run: cd web && npm ci && npm run build
      - uses: jdx/mise-action@v4
      # cosign for keyless signing of the checksums file
      - uses: sigstore/cosign-installer@v3
      # syft for SBOM generation (goreleaser sboms: section shells out to syft)
      - uses: anchore/sbom-action/download-syft@v0
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GitHub PAT with repo write access on Temikus/homebrew-denkeeper.
          # Add at: github.com/Temikus/denkeeper/settings/secrets/actions
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  docker:
    name: Docker
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/temikus/denkeeper
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: sigstore/cosign-installer@v3
      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.head_commit.timestamp }}
      # Sign by digest (immutable) rather than tag (mutable)
      - name: Sign Docker image
        run: |
          cosign sign --yes \
            ghcr.io/temikus/denkeeper@${{ steps.build.outputs.digest }}
      # Attach SLSA build provenance attestation to the image
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/temikus/denkeeper
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

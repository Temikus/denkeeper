name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  id-token: write        # Required for cosign keyless OIDC signing and build attestations
  attestations: write    # Required for actions/attest-build-provenance
  security-events: write # Required for Grype SARIF upload

jobs:
  build-ui:
    name: Build Web UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build web UI
        run: cd web && npm ci && npm run build
      - name: Upload web UI artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-ui-dist
          path: internal/web/dist/
          retention-days: 1

  test:
    name: Test
    needs: build-ui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download web UI
        uses: actions/download-artifact@v4
        with:
          name: web-ui-dist
          path: internal/web/dist/
      - uses: jdx/mise-action@v4
      - name: Cache Go modules and build
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-
      - run: go test -race ./...

  release:
    name: Release
    needs: [test, build-ui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download web UI
        uses: actions/download-artifact@v4
        with:
          name: web-ui-dist
          path: internal/web/dist/
      - uses: jdx/mise-action@v4
      - name: Cache Go modules and build
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-
      # cosign for keyless signing of the checksums file
      - uses: sigstore/cosign-installer@v3
      # syft for SBOM generation (goreleaser sboms: section shells out to syft)
      - uses: anchore/sbom-action/download-syft@v0
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GitHub PAT with repo write access on Temikus/homebrew-denkeeper.
          # Add at: github.com/Temikus/denkeeper/settings/secrets/actions
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  helm:
    name: Helm Chart
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Helm
        uses: azure/setup-helm@v4
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Set chart version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version: .*/version: ${VERSION}/" deploy/helm/denkeeper/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"${VERSION}\"/" deploy/helm/denkeeper/Chart.yaml
      - name: Package chart
        run: helm package deploy/helm/denkeeper --destination "$RUNNER_TEMP"
      - name: Push chart to GHCR
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          helm push "$RUNNER_TEMP/denkeeper-${VERSION}.tgz" oci://ghcr.io/temikus/charts

  docker:
    name: Docker
    needs: [test, build-ui]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download web UI
        uses: actions/download-artifact@v4
        with:
          name: web-ui-dist
          path: internal/web/dist/
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/temikus/denkeeper
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: sigstore/cosign-installer@v3
      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/temikus/denkeeper:buildcache
          cache-to: type=registry,ref=ghcr.io/temikus/denkeeper:buildcache,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.head_commit.timestamp }}
      # Scan the pushed image for vulnerabilities before signing
      - name: Scan container image
        uses: anchore/scan-action@v7
        id: grype-scan
        with:
          image: "ghcr.io/temikus/denkeeper@${{ steps.build.outputs.digest }}"
          fail-on: "high"
          output-format: "sarif"
      - name: Upload container scan SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ steps.grype-scan.outputs.sarif }}
      # Sign by digest (immutable) rather than tag (mutable)
      - name: Sign Docker image
        run: |
          cosign sign --yes \
            ghcr.io/temikus/denkeeper@${{ steps.build.outputs.digest }}
      # Attach SLSA build provenance attestation to the image
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/temikus/denkeeper
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

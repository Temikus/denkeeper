# Minimal config for E2E testing.
# Uses a no-op LLM provider (Ollama with unreachable endpoint) and SQLite.
#
# data_dir is set via DENKEEPER_DATA_DIR env var (created by globalSetup.js).
# All paths (db, persona, skills) derive from data_dir automatically.

[llm]
default_provider = "ollama"
default_model = "test-model"
cost_limit_hard = 100.0

[llm.ollama]
base_url = "http://127.0.0.1:1"   # unreachable — chat will fail gracefully

[api]
listen = ":8080"

[api.auth]
password_hash = "$2a$13$7GUyWo4wSXOVEW5GqDRqOeHggYFzyYvkwhFfl/kPcyCP28.l6vrm."  # "test"
session_secret = "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
session_max_age = "24h"

[[api.keys]]
name = "e2e-test"
key = "e2e-test-token-12345678"
scopes = ["admin", "chat", "sessions:read", "costs:read", "skills:read", "skills:write", "schedules:read", "schedules:write", "approvals:read", "approvals:write", "tools:read", "tools:write", "kv:read", "kv:write", "agents:read", "agents:write"]

[session]
tier = "autonomous"

[web]
enabled = false

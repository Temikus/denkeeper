apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "denkeeper.fullname" . }}-config
  labels:
    {{- include "denkeeper.labels" . | nindent 4 }}
data:
  denkeeper.toml: |
    # Generated by Helm — non-secret config only.
    # Secrets are injected as DENKEEPER_* env vars from the Secret resource.

    [log]
    level = {{ .Values.config.log.level | quote }}
    format = {{ .Values.config.log.format | quote }}

    [llm]
    default_provider = {{ .Values.config.llm.default_provider | quote }}
    default_model = {{ .Values.config.llm.default_model | quote }}

    [api]
    enabled = {{ .Values.config.api.enabled }}
    listen = {{ .Values.config.api.listen | quote }}

    [session]
    tier = {{ .Values.config.session.tier | quote }}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "denkeeper.fullname" . }}-config
  labels:
    {{- include "denkeeper.labels" . | nindent 4 }}
data:
  denkeeper.toml: |
    # Generated by Helm - non-secret config only.
    # Secrets are injected as DENKEEPER_* env vars from the Secret resource.
{{ toToml .Values.config | indent 4 }}

{{- include "denkeeper.validate" . }}
{{- if gt (int .Values.replicaCount) 1 }}
{{- fail "replicaCount must be 1 — SQLite does not support concurrent writers" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "denkeeper.fullname" . }}
  labels:
    {{- include "denkeeper.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "denkeeper.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "denkeeper.selectorLabels" . | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      {{- if .Values.persistence.enabled }}
      initContainers:
        - name: init-data-dir
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          command:
            - sh
            - -c
            - |
              chown 65534:65534 /data
              if [ ! -f /data/denkeeper.toml ]; then
                cp /config/denkeeper.toml /data/denkeeper.toml
                chown 65534:65534 /data/denkeeper.toml
              fi
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: data
              mountPath: /data
      {{- end }}
      containers:
        - name: denkeeper
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: {{ include "denkeeper.secretName" . }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /data
            {{- end }}
            - name: tmp
              mountPath: /tmp
        {{- with .Values.extraContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "denkeeper.fullname" . }}-config
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "denkeeper.fullname" . }}-data
        {{- end }}
        - name: tmp
          emptyDir: {}

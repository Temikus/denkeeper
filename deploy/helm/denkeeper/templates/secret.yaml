{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "denkeeper.fullname" . }}
  labels:
    {{- include "denkeeper.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.telegramToken }}
  DENKEEPER_TELEGRAM_TOKEN: {{ .Values.secrets.telegramToken | quote }}
  {{- end }}
  {{- if .Values.secrets.discordToken }}
  DENKEEPER_DISCORD_TOKEN: {{ .Values.secrets.discordToken | quote }}
  {{- end }}
  {{- if .Values.secrets.llmOpenrouterApiKey }}
  DENKEEPER_LLM_OPENROUTER_API_KEY: {{ .Values.secrets.llmOpenrouterApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.llmAnthropicApiKey }}
  DENKEEPER_LLM_ANTHROPIC_API_KEY: {{ .Values.secrets.llmAnthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.voiceOpenaiApiKey }}
  DENKEEPER_VOICE_OPENAI_API_KEY: {{ .Values.secrets.voiceOpenaiApiKey | quote }}
  {{- end }}
{{- end }}

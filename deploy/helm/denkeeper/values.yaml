# Default values for denkeeper.
# See https://temikus.github.io/denkeeper/docs/getting-started/configuration/

# SQLite is single-writer — do not increase beyond 1.
replicaCount: 1

image:
  repository: ghcr.io/temikus/denkeeper
  # Defaults to Chart.appVersion if empty.
  tag: ""
  pullPolicy: IfNotPresent

# -- Secrets injected as DENKEEPER_* env vars.
# Set values here, or point existingSecret to a pre-existing Kubernetes Secret.
# For stronger isolation, use an external secret manager (External Secrets Operator,
# Vault Agent) and reference it via existingSecret.
secrets:
  telegramToken: ""
  discordToken: ""
  llmOpenrouterApiKey: ""
  llmAnthropicApiKey: ""
  voiceOpenaiApiKey: ""
  searchApiKey: ""          # required only for Tavily search provider
  sessionSecret: ""         # DENKEEPER_API_AUTH_SESSION_SECRET (hex-encoded AES-256 key, 64 hex chars)
  oidcClientId: ""          # DENKEEPER_OIDC_CLIENT_ID
  oidcClientSecret: ""      # DENKEEPER_OIDC_CLIENT_SECRET

# -- Name of a pre-existing Secret containing DENKEEPER_* keys.
# When set, the chart-managed Secret is not created. The referenced Secret
# must exist in the release namespace or the pod will fail to start.
existingSecret: ""

# -- Non-secret config rendered into the ConfigMap's denkeeper.toml via toToml.
# Any key added here becomes a TOML section automatically — no template changes needed.
# Only non-sensitive settings belong here. Secrets are injected via env vars.
#
# Bootstrap behaviour: on first pod start the ConfigMap is copied to the PVC at
# /data/denkeeper.toml. After that the file lives independently and is writeable
# by the app (runtime tool/plugin mutations persist across restarts). To re-seed
# from Helm values, delete /data/denkeeper.toml and restart the pod.
config:
  log:
    level: "info"
    format: "json"
  llm:
    default_provider: "anthropic"
    default_model: "anthropic/claude-sonnet-4-20250514"
  otel:
    enabled: false
    traces_endpoint: ""      # OTLP HTTP endpoint, e.g., "http://otel-collector:4318"
    service_name: "denkeeper"
  api:
    enabled: true
    listen: ":8080"
    auth:
      password_hash: ""      # bcrypt hash from `denkeeper passwd`
      session_secret: ""     # hex-encoded AES-256 key (64 hex chars); prefer secrets.sessionSecret
      session_max_age: "24h"
      oidc:
        enabled: false
        issuer: ""
        client_id: ""        # prefer secrets.oidcClientId
        client_secret: ""    # prefer secrets.oidcClientSecret
        redirect_url: ""
        scopes: ["openid", "email", "profile"]
        allowed_emails: []
  session:
    tier: "supervised"

  # -- Adapter config (tokens are injected via secrets, add non-secret fields here).
  # telegram:
  #   allowed_users: [111222333]
  # discord:
  #   allowed_users: ["123456789012345678"]

  # -- Agent defaults and multi-agent routing.
  # agent:
  #   persona_dir: "/data/persona"
  # agents:
  #   - name: "default"
  #     persona_dir: "/data/persona/default"
  #     adapters: ["telegram"]
  #     llm_model: "anthropic/claude-sonnet-4-20250514"

  # -- Scheduled tasks.
  # schedules:
  #   - name: "morning-check"
  #     cron: "0 8 * * *"
  #     agent: "default"
  #     message: "Good morning! Any updates?"

  # -- Web search & fetch (enabled by default with free DuckDuckGo search).
  # web:
  #   enabled: true          # set to false to disable web tools
  #   search:
  #     provider: "duckduckgo"
  #     # provider: "tavily"  # requires searchApiKey in secrets
  #   fetch:
  #     timeout: "30s"

  # -- Memory store (SQLite). db_path must be on a writable, persistent volume.
  memory:
    db_path: "/data/memory.db"
  # kv:
  #   max_keys_per_agent: 1000
  #   max_value_bytes: 65536
  # sandbox:
  #   runtime: "docker"
  #   kubernetes:
  #     namespace: "denkeeper-sandboxes"

persistence:
  enabled: true
  storageClass: ""
  size: 1Gi
  accessModes:
    - ReadWriteOnce

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  #  - host: denkeeper.example.com
  #    paths:
  #      - path: /
  #        pathType: ImplementationSpecific
  tls: []
  #  - secretName: denkeeper-tls
  #    hosts:
  #      - denkeeper.example.com

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

securityContext:
  runAsNonRoot: true
  runAsUser: 65534
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
  seccompProfile:
    type: RuntimeDefault

namespace:
  create: false
  name: denkeeper

# -- Extra containers injected into the pod alongside the main denkeeper container.
# Useful for MCP server sidecars that communicate over localhost or a shared volume.
# Each entry is a full Kubernetes container spec.
extraContainers: []
# - name: jmap-mcp
#   image: ghcr.io/temikus/jmap-mcp:latest
#   env:
#     - name: JMAP_SESSION_URL
#       value: "https://api.fastmail.com/jmap/session"
#     - name: JMAP_BEARER_TOKEN
#       valueFrom:
#         secretKeyRef:
#           name: jmap-secrets
#           key: bearer-token
#     - name: MCP_TRANSPORT
#       value: "sse"

# -- ServiceMonitor for Prometheus Operator (kube-prometheus-stack).
# Requires the prometheus-operator CRDs (monitoring.coreos.com/v1) to be installed.
# kube-prometheus-stack installs these automatically.
#
# Denkeeper exposes Prometheus metrics at /metrics when OTel is enabled
# (config.otel.enabled: true). Distributed traces are pushed to Tempo/Jaeger
# via config.otel.traces_endpoint — no scrape config needed for those.
#
# To have Prometheus discover this ServiceMonitor, the additionalLabels must
# match the Prometheus CR's serviceMonitorSelector. kube-prometheus-stack
# defaults to: { release: <prometheus-helm-release-name> }
serviceMonitor:
  enabled: false
  # -- Extra labels added to the ServiceMonitor metadata.
  # Must match the Prometheus CR's serviceMonitorSelector to be picked up.
  # Example: { release: kube-prometheus-stack }
  additionalLabels: {}
  path: /metrics
  interval: 30s
  scrapeTimeout: 10s
  scheme: http
  # -- TLS configuration for HTTPS scraping.
  tlsConfig: {}
  # insecureSkipVerify: true
  # -- Secret containing a bearer token for authenticated scraping.
  bearerTokenSecret: {}
  # name: denkeeper-api-keys
  # key: prometheus-scrape-token
  # -- Prometheus relabeling rules applied during scraping.
  relabelings: []

version: 2
project_name: denkeeper

before:
  hooks:
    - go mod tidy

# ── Builds ────────────────────────────────────────────────────────────────────
builds:
  - id: denkeeper
    main: ./cmd/denkeeper
    binary: denkeeper
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
        -X main.version={{.Version}}
        -X main.commit={{.Commit}}
        -X main.date={{.Date}}

# ── Archives ──────────────────────────────────────────────────────────────────
archives:
  - id: default
    ids: [denkeeper]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

# ── Checksums ─────────────────────────────────────────────────────────────────
checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# ── SBOM ──────────────────────────────────────────────────────────────────────
# Requires syft on PATH. In release.yml, anchore/sbom-action/download-syft installs it.
sboms:
  - artifacts: archive

# ── Signing ───────────────────────────────────────────────────────────────────
# Keyless cosign OIDC signing — no stored keys.
# Requires id-token:write permission in release.yml and cosign-installer to be run first.
# Signs the checksums file; every archive hash is listed there.
# Uses cosign v3 bundle format (signature + certificate in a single .bundle file).
signs:
  - id: cosign
    cmd: cosign
    artifacts: checksum
    signature: "${artifact}.bundle"
    args:
      - sign-blob
      - --yes
      - --bundle=${signature}
      - ${artifact}

# ── Linux packages (.deb / .rpm) ──────────────────────────────────────────────
nfpms:
  - id: packages
    package_name: denkeeper
    ids: [denkeeper]
    vendor: Temikus
    homepage: https://github.com/Temikus/denkeeper
    maintainer: Temikus <github@temik.us>
    description: |-
      Denkeeper — a security-first personal AI agent.
      Connects to Telegram and Discord, routes messages through LLM providers
      (Anthropic, OpenRouter, Ollama), and persists conversations in SQLite.
    license: Apache-2.0
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: packaging/denkeeper.service
        dst: /lib/systemd/system/denkeeper.service
        file_info:
          mode: 0644
      - src: denkeeper.toml.example
        dst: /etc/denkeeper/denkeeper.toml.example
        file_info:
          mode: 0640
        type: config|noreplace
    scripts:
      preinstall:  packaging/scripts/preinstall.sh
      postinstall: packaging/scripts/postinstall.sh
      preremove:   packaging/scripts/preremove.sh
    section: utils
    priority: optional
    deb:
      fields:
        Bugs: https://github.com/Temikus/denkeeper/issues
    rpm:
      summary: Security-first personal AI agent
      group: Applications/Internet

# ── Homebrew tap ──────────────────────────────────────────────────────────────
# Requires HOMEBREW_TAP_TOKEN secret (GitHub PAT with repo write access on
# Temikus/homebrew-denkeeper). Add it at:
# github.com/Temikus/denkeeper/settings/secrets/actions
homebrew_casks:
  - name: denkeeper
    ids: [default]
    repository:
      owner: Temikus
      name: homebrew-denkeeper
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/Temikus/denkeeper
    description: Security-first personal AI agent (Telegram/Discord, Anthropic/OpenRouter/Ollama)
    license: Apache-2.0

# ── Changelog ─────────────────────────────────────────────────────────────────
changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "^style:"
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?(feat|feature)(\(.+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Other Changes
      order: 999
